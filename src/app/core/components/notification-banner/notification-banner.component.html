<section class="notification-banner-shell" *ngIf="banner$ | async as banner">
  <div
    class="notification-banner"
    [class.is-error]="banner.level === 'error'"
    [class.is-success]="banner.level === 'success'"
    [attr.aria-live]="getAriaLive(banner.level)"
    [attr.role]="getRole(banner.level)">
    <div class="notification-banner__main">
      <div class="notification-banner__icon" aria-hidden="true">
        <mat-icon>{{ getIcon(banner.level) }}</mat-icon>
      </div>

      <div class="notification-banner__copy">
        <div class="notification-banner__eyebrow">{{ getEyebrow(banner.level) }}</div>
        <p class="notification-banner__message">{{ banner.message }}</p>
      </div>
    </div>

    <button
      type="button"
      mat-stroked-button
      class="notification-banner__dismiss"
      (click)="dismiss()"
      [attr.aria-label]="getDismissLabel(banner.level)">
      Chiudi
    </button>
  </div>
</section>
